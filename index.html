<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Доставка напитков - Астана</title>
    <style>
      @font-face {
        font-family: "AvanteInt";
        src: url("./fonts/ofont.ru_a_AvanteInt.ttf") format("truetype");
        font-weight: 400 900;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: "DrukCyr";
        src: url("fonts/DrukCyr_Bold_2.woff") format("woff2");
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "AvanteInt", sans-serif;
      }

      html, body {
        height: 100%;
        overflow: hidden;
      }

      body {
        background: url("./images/fon.png");
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100dvh;
        color: #000;
        text-align: center;
        padding: 12px 16px;
      }

      .container {
        max-width: 500px;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .logo { margin-bottom: 10px; }
      .logo img { width: 160px; height: auto; display: block; }

      .title {
        font-size: 28px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -0.5px;
        margin-bottom: 2px;
        line-height: 1.1;
      }

      .subtitle {
        font-size: 17px;
        font-weight: 700;
        margin-bottom: 10px;
      }

      /* Banner: 36px katta (720px+), 24px o'rta (480-720px), 18px kichik (480px-) */
      .banner {
        background-color: #000;
        color: #f7ce16;
        padding: 8px 14px;
        border-radius: 10px;
        font-size: 36px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 12px;
        display: block;
        font-family: "DrukCyr", sans-serif;
      }

      .phone {
        font-size: 36px;
        font-weight: 900;
        margin-bottom: 12px;
        letter-spacing: -0.5px;
      }

      .btn {
        display: block;
        text-decoration: none;
        color: #fff;
        border-radius: 15px;
        width: 100%;
        max-width: 360px;
        text-align: center;
        transition: all 0.2s ease;
        margin-bottom: 10px;
        border: none;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      }

      .btn:active { transform: scale(0.96); }

      .btn-call {
        background-color: #e31e33;
        padding: 14px;
        font-size: 24px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .btn-whatsapp {
        background-color: #00a859;
        padding: 8px 15px;
        font-size: 17px;
        font-weight: 700;
        line-height: 1.2;
      }

      .btn-whatsapp span {
        font-size: 28px;
        font-weight: 800;
        display: block;
      }

      .footer { margin-top: 14px; }
      .footer-small { font-size: 20px; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; opacity: 0.9; margin-bottom: 19px; }
      .footer-large { font-size: 28px; font-weight: 900; text-transform: uppercase; margin-bottom: 2px; }
      .footer-medium { font-size: 28px; font-weight: 800; }

      @media (max-width: 720px) {
        .banner { font-size: 24px; }
      }

      @media (max-width: 480px) {
        .banner { font-size: 24px; }
      }

      @media (max-height: 650px) {
        .logo img { width: 100px; }
        .logo { margin-bottom: 6px; }
        .title { font-size: 22px; }
        .subtitle { font-size: 14px; margin-bottom: 6px; }
        .banner { padding: 6px 10px; margin-bottom: 8px; }
        .phone { font-size: 28px; margin-bottom: 8px; }
        .btn-call { font-size: 20px; padding: 11px; }
        .btn-whatsapp { font-size: 14px; padding: 6px 10px; }
        .btn-whatsapp span { font-size: 22px; }
        .btn { margin-bottom: 7px; }
        .footer { margin-top: 8px; }
        .footer-small { font-size: 11px; }
        .footer-large { font-size: 20px; }
        .footer-medium { font-size: 16px; }
      }

      @media (max-height: 550px) {
        .logo { margin-bottom: 4px; }
        .logo img { width: 80px; }
        .title { font-size: 18px; }
        .subtitle { font-size: 12px; margin-bottom: 4px; }
        .banner { padding: 5px 8px; margin-bottom: 6px; }
        .phone { font-size: 24px; margin-bottom: 6px; }
        .btn-call { font-size: 17px; padding: 9px; }
        .btn-whatsapp { font-size: 12px; padding: 5px 8px; }
        .btn-whatsapp span { font-size: 19px; }
        .btn { margin-bottom: 5px; border-radius: 10px; }
        .footer { margin-top: 6px; }
        .footer-small { font-size: 10px; }
        .footer-large { font-size: 17px; }
        .footer-medium { font-size: 14px; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <img src="https://i.postimg.cc/m2QS35gR/llogo-1-2.png" alt="KOSTA Logo" />
      </div>

      <h1 class="title">ДОСТАВКА НАПИТКОВ</h1>
      <p class="subtitle">До любой точки г. Астана</p>

      <div class="banner">ДОСТАВКА ПО ГОРОДУ &mdash; БЫСТРО И УДОБНО</div>

      <div class="phone">+7 707 505 57 47</div>

      <a href="tel:+77075055747" class="btn btn-call">ПОЗВОНИТЬ</a>

      <a href="https://wa.me/77075055747?text=Здравствуйте!Пишу с сайта.Хочу сделать заказ." class="btn btn-whatsapp">
        написать на<br />
        <span>WhatsApp</span>
      </a>

      <div class="footer">
        <p class="footer-small">ОДНА ИЗ КРУПНЕЙШИХ СЕТЕЙ</p>
        <p class="footer-large">БОЛЕЕ 20 ФИЛИАЛОВ</p>
        <p class="footer-medium">по г. Астана</p>
      </div>
    </div>
  </body>
</html>
